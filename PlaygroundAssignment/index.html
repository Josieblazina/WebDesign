<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product Gallery</title>
    <link rel="stylesheet" href="style/style.css" />
  </head>
  <body>

    <div class="grid">

      <div class="tile tile-dark">
        <p class="label">WWDC26</p>
        <h2>Apple Worldwide Developers Conference.</h2>
        <p class="sub">Join us online June 8–12.</p>
        <div class="buttons">
          <a class="btn btn-blue" href="#">Learn more</a>
        </div>
      </div>

      <div class="tile tile-light">
        <p class="label">AirPods Max 2</p>
        <h2>Listening. Remastered.</h2>
        <div class="buttons">
          <a class="btn btn-blue" href="#">Learn more</a>
          <a class="btn btn-outline" href="#">Buy</a>
        </div>
      </div>

      <div class="tile tile-light">
        <p class="label">Apple Watch Series 11</p>
        <h2>The ultimate way to watch your health.</h2>
        <div class="buttons">
          <a class="btn btn-blue" href="#">Learn more</a>
          <a class="btn btn-outline" href="#">Buy</a>
        </div>
      </div>

      <div class="tile tile-dark">
        <p class="label">MacBook Pro</p>
        <h2>Now with M5, M5 Pro, and M5 Max.</h2>
        <div class="buttons">
          <a class="btn btn-blue" href="#">Learn more</a>
          <a class="btn btn-outline-light" href="#">Buy</a>
        </div>
      </div>

    </div>

  </body>
</html>
